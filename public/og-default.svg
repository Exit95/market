<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <!-- Subtle border accent -->
  <rect x="40" y="40" width="1120" height="550" rx="4" fill="none" stroke="#c8973a" stroke-width="1" opacity="0.3"/>
  <!-- Gold line top -->
  <line x1="200" y1="250" x2="1000" y2="250" stroke="#c8973a" stroke-width="0.5" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#c8973a">Ehren-Deal</text>
  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#c8973a" opacity="0.7" letter-spacing="4">Sicher handeln. Mit Ehre.</text>
  <!-- Gold line bottom -->
  <line x1="200" y1="420" x2="1000" y2="420" stroke="#c8973a" stroke-width="0.5" opacity="0.4"/>
  <!-- Domain -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" opacity="0.35" letter-spacing="2">ehren-deal.de</text>
</svg>
