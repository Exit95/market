<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="93" rx="36" ry="3.5" fill="#a37a2e" opacity="0.35"/>
  <!-- Chair back — GOLD body -->
  <rect x="20" y="20" width="60" height="48" rx="10" fill="#c8973a" stroke="#a37a2e" stroke-width="1.8"/>
  <!-- Back inner cushion — slightly darker gold -->
  <rect x="26" y="26" width="48" height="36" rx="7" fill="#dbb568" stroke="#a37a2e" stroke-width="1"/>
  <!-- Tufting buttons — dark on gold, very visible -->
  <circle cx="36" cy="38" r="3" fill="#0a0a0b"/>
  <circle cx="50" cy="38" r="3" fill="#0a0a0b"/>
  <circle cx="64" cy="38" r="3" fill="#0a0a0b"/>
  <circle cx="43" cy="50" r="3" fill="#0a0a0b"/>
  <circle cx="57" cy="50" r="3" fill="#0a0a0b"/>
  <!-- Stitch lines -->
  <line x1="36" y1="38" x2="43" y2="50" stroke="#a37a2e" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="38" x2="43" y2="50" stroke="#a37a2e" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="38" x2="57" y2="50" stroke="#a37a2e" stroke-width="1" opacity="0.6"/>
  <line x1="64" y1="38" x2="57" y2="50" stroke="#a37a2e" stroke-width="1" opacity="0.6"/>
  <!-- Seat cushion — gold -->
  <rect x="16" y="60" width="68" height="20" rx="8" fill="#c8973a" stroke="#a37a2e" stroke-width="1.8"/>
  <rect x="21" y="64" width="58" height="12" rx="5" fill="#dbb568" stroke="#a37a2e" stroke-width="0.8"/>
  <!-- Armrests -->
  <rect x="10" y="38" width="12" height="42" rx="6" fill="#c8973a" stroke="#a37a2e" stroke-width="1.8"/>
  <rect x="8" y="38" width="16" height="8" rx="4" fill="#dbb568" stroke="#a37a2e" stroke-width="1"/>
  <rect x="78" y="38" width="12" height="42" rx="6" fill="#c8973a" stroke="#a37a2e" stroke-width="1.8"/>
  <rect x="76" y="38" width="16" height="8" rx="4" fill="#dbb568" stroke="#a37a2e" stroke-width="1"/>
  <!-- Legs — dark, grounded -->
  <rect x="20" y="78" width="8" height="14" rx="3" fill="#e8e4de"/>
  <rect x="72" y="78" width="8" height="14" rx="3" fill="#e8e4de"/>
</svg>
