<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Antenna -->
  <line x1="50" y1="14" x2="50" y2="6" stroke="#e8e4de" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="50" cy="4.5" r="3.5" fill="#c8973a" stroke="#dbb568" stroke-width="1.5"/>
  <!-- Head — FG light fill so it pops -->
  <rect x="26" y="14" width="48" height="34" rx="7" fill="#e8e4de" stroke="#c8973a" stroke-width="2"/>
  <!-- Head inner panel — gold -->
  <rect x="30" y="18" width="40" height="26" rx="5" fill="#c8973a"/>
  <!-- Eye sockets — dark -->
  <rect x="32" y="22" width="14" height="11" rx="4" fill="#0a0a0b" stroke="#a37a2e" stroke-width="1"/>
  <rect x="54" y="22" width="14" height="11" rx="4" fill="#0a0a0b" stroke="#a37a2e" stroke-width="1"/>
  <!-- Eyes — bright fg glow -->
  <circle cx="39" cy="27" r="4" fill="#dbb568"/>
  <circle cx="39" cy="27" r="2" fill="#e8e4de"/>
  <circle cx="37" cy="25" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="61" cy="27" r="4" fill="#dbb568"/>
  <circle cx="61" cy="27" r="2" fill="#e8e4de"/>
  <circle cx="59" cy="25" r="1.2" fill="white" opacity="0.8"/>
  <!-- Smile -->
  <path d="M35 40 Q50 49 65 40" fill="none" stroke="#0a0a0b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ear bolts -->
  <circle cx="26" cy="30" r="3.5" fill="#c8973a" stroke="#dbb568" stroke-width="1.5"/>
  <circle cx="74" cy="30" r="3.5" fill="#c8973a" stroke="#dbb568" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="40" y="46" width="20" height="8" rx="3" fill="#e8e4de" stroke="#c8973a" stroke-width="1.2"/>
  <!-- Body — fg light -->
  <rect x="18" y="52" width="64" height="38" rx="8" fill="#e8e4de" stroke="#c8973a" stroke-width="2"/>
  <!-- Body inner panel — gold -->
  <rect x="24" y="58" width="52" height="26" rx="5" fill="#c8973a"/>
  <!-- Buttons — dark on gold -->
  <circle cx="36" cy="66" r="5" fill="#0a0a0b" stroke="#dbb568" stroke-width="1.5"/>
  <circle cx="50" cy="66" r="5" fill="#a37a2e" stroke="#dbb568" stroke-width="1.5"/>
  <circle cx="64" cy="66" r="5" fill="#0a0a0b" stroke="#dbb568" stroke-width="1.5"/>
  <!-- Center button cross -->
  <line x1="47" y1="66" x2="53" y2="66" stroke="#dbb568" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="63" x2="50" y2="69" stroke="#dbb568" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Speaker grill — dark bar on gold -->
  <rect x="28" y="76" width="44" height="6" rx="2" fill="#0a0a0b"/>
  <line x1="32" y1="78" x2="32" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="78" x2="36" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="78" x2="40" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="78" x2="44" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="78" x2="48" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="78" x2="52" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="78" x2="56" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="78" x2="60" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="78" x2="64" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="78" x2="68" y2="80" stroke="#dbb568" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arms -->
  <rect x="4" y="56" width="14" height="26" rx="6" fill="#e8e4de" stroke="#c8973a" stroke-width="1.8"/>
  <rect x="82" y="56" width="14" height="26" rx="6" fill="#e8e4de" stroke="#c8973a" stroke-width="1.8"/>
  <!-- Hands -->
  <rect x="4" y="78" width="6" height="8" rx="2.5" fill="#c8973a" stroke="#a37a2e" stroke-width="1"/>
  <rect x="12" y="78" width="6" height="8" rx="2.5" fill="#c8973a" stroke="#a37a2e" stroke-width="1"/>
  <rect x="82" y="78" width="6" height="8" rx="2.5" fill="#c8973a" stroke="#a37a2e" stroke-width="1"/>
  <rect x="90" y="78" width="6" height="8" rx="2.5" fill="#c8973a" stroke="#a37a2e" stroke-width="1"/>
</svg>
