  <line x1="63" y1="52" x2="89" y2="78" stroke="#e8e4de" stroke-width="1.2"/>
  <line x1="89" y1="52" x2="63" y2="78" stroke="#e8e4de" stroke-width="1.2"/>
  <!-- FRAME — GOLD, thick & bold -->
  <line x1="24" y1="65" x2="50" y2="67" stroke="#c8973a" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="67" x2="44" y2="39" stroke="#c8973a" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="39" x2="24" y2="65" stroke="#a37a2e" stroke-width="3.2" stroke-linecap="round"/>
