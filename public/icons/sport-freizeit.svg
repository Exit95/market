  <line x1="73" y1="52" x2="50" y2="67" stroke="#c8973a" stroke-width="4" stroke-linecap="round"/>
  <!-- Head tube -->
  <line x1="71" y1="40" x2="73" y2="52" stroke="#dbb568" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Fork -->
  <line x1="73" y1="52" x2="76" y2="65" stroke="#c8973a" stroke-width="3.2" stroke-linecap="round"/>
  <!-- BB -->
  <circle cx="50" cy="67" r="5" fill="#c8973a" stroke="#dbb568" stroke-width="1.5"/>
