  <rect x="38" y="58" width="8" height="2.5" rx="1" fill="#e8e4de"/>
  <!-- Saddle -->
  <path d="M36 36 Q44 31 52 36" fill="none" stroke="#e8e4de" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="36" x2="44" y2="39" stroke="#e8e4de" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handlebars -->
  <path d="M68 36 L73 40 L78 36" fill="none" stroke="#e8e4de" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
