  <line x1="50" y1="67" x2="56" y2="74" stroke="#e8e4de" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="67" x2="44" y2="60" stroke="#e8e4de" stroke-width="2.5" stroke-linecap="round"/>
