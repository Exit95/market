  <line x1="24" y1="46" x2="24" y2="84" stroke="#e8e4de" stroke-width="1.2"/>
  <line x1="5" y1="65" x2="43" y2="65" stroke="#e8e4de" stroke-width="1.2"/>
  <line x1="11" y1="52" x2="37" y2="78" stroke="#e8e4de" stroke-width="1.2"/>
  <line x1="37" y1="52" x2="11" y2="78" stroke="#e8e4de" stroke-width="1.2"/>
