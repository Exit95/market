<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="46" cy="93" rx="34" ry="3.5" fill="#a37a2e" opacity="0.3"/>
  <!-- House walls — FG light -->
  <rect x="12" y="50" width="68" height="42" rx="3" fill="#e8e4de" stroke="#c8973a" stroke-width="2"/>
  <!-- Roof — GOLD -->
  <polygon points="6,52 46,14 86,52" fill="#c8973a" stroke="#a37a2e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Roof highlight -->
  <line x1="46" y1="14" x2="86" y2="52" stroke="#dbb568" stroke-width="1" opacity="0.4"/>
  <!-- Chimney — gold -->
  <rect x="58" y="20" width="9" height="22" rx="2" fill="#a37a2e" stroke="#c8973a" stroke-width="1.5"/>
  <!-- Smoke -->
  <circle cx="62" cy="17" r="3" fill="#6b6b6b" opacity="0.35"/>
  <circle cx="65" cy="12" r="2" fill="#6b6b6b" opacity="0.2"/>
  <!-- Door — dark on light wall -->
  <rect x="28" y="68" width="16" height="24" rx="3" fill="#0a0a0b" stroke="#c8973a" stroke-width="1.5"/>
  <path d="M28 73 Q36 65 44 73" fill="#0a0a0b" stroke="#c8973a" stroke-width="1"/>
  <circle cx="42" cy="81" r="2.2" fill="#c8973a"/>
  <!-- Windows — dark on light wall -->
  <rect x="14" y="58" width="14" height="14" rx="2" fill="#0a0a0b" stroke="#c8973a" stroke-width="1.2"/>
  <line x1="21" y1="58" x2="21" y2="72" stroke="#c8973a" stroke-width="0.8" opacity="0.6"/>
  <line x1="14" y1="65" x2="28" y2="65" stroke="#c8973a" stroke-width="0.8" opacity="0.6"/>
  <rect x="15" y="59" width="5" height="5" rx="1" fill="#dbb568" opacity="0.3"/>
  <rect x="54" y="58" width="14" height="14" rx="2" fill="#0a0a0b" stroke="#c8973a" stroke-width="1.2"/>
  <line x1="61" y1="58" x2="61" y2="72" stroke="#c8973a" stroke-width="0.8" opacity="0.6"/>
  <line x1="54" y1="65" x2="68" y2="65" stroke="#c8973a" stroke-width="0.8" opacity="0.6"/>
  <rect x="55" y="59" width="5" height="5" rx="1" fill="#dbb568" opacity="0.3"/>

  <!-- KEY — all gold, bold & clear -->
  <circle cx="80" cy="36" r="13" fill="none" stroke="#c8973a" stroke-width="4.5"/>
  <circle cx="80" cy="36" r="7" fill="#c8973a"/>
  <circle cx="80" cy="36" r="3.5" fill="#0a0a0b"/>
  <!-- Key shaft -->
  <rect x="78.5" y="48" width="4" height="24" rx="2" fill="#c8973a"/>
  <!-- Teeth -->
  <rect x="82.5" y="55" width="7.5" height="4" rx="1.5" fill="#c8973a"/>
  <rect x="82.5" y="63" width="5.5" height="4" rx="1.5" fill="#c8973a"/>
  <!-- Key highlight -->
  <line x1="79" y1="49" x2="79" y2="70" stroke="#dbb568" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
</svg>
