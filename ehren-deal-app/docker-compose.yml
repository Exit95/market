services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=mysql://ehrendeal:ehrendeal_pass@mariadb:3306/ehren_deal
      - JWT_SECRET=dev-jwt-secret-change-in-production-min32chars
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production-min32
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=ehren-deal
      - S3_PUBLIC_BASE_URL=http://localhost:9002/ehren-deal
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@ehren-deal.de}
      - APP_URL=${APP_URL:-https://ehren-deal.de}
      - PORT=4000
      - HOST=0.0.0.0
    depends_on:
      mariadb:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=ehren_deal
      - MYSQL_USER=ehrendeal
      - MYSQL_PASSWORD=ehrendeal_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  mariadb_data:
  minio_data:
